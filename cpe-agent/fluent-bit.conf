[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# Tail the syslog file
[INPUT]
    Name          tail
    Path          /var/log/syslog
    Tag           cpe.syslog
    Parser        syslog-rfc3164
    Refresh_Interval 5
    Read_from_Head True
    DB            /var/log/flb_syslog.db

# Also accept logs on syslog UDP (local processes can send here)
[INPUT]
    Name          syslog
    Tag           cpe.syslog.udp
    Mode          udp
    Listen        0.0.0.0
    Port          5140
    Parser        syslog-rfc3164

# Add CPE metadata
[FILTER]
    Name          record_modifier
    Match         cpe.*
    Record        cpe_id ${CPE_ID}
    Record        cpe_model ${CPE_MODEL}
    Record        firmware ${FIRMWARE_VERSION}

# Rate limit to prevent log storms from overwhelming the desktop
[FILTER]
    Name          throttle
    Match         cpe.*
    Rate          800
    Window        5
    Print_Status  true
    Interval      30s

# Forward to desktop analyzer over HTTP
[OUTPUT]
    Name          http
    Match         cpe.*
    Host          ${DESKTOP_HOST}
    Port          ${DESKTOP_PORT}
    URI           /api/v1/logs
    Format        json
    Json_date_key timestamp
    Json_date_format iso8601
    Retry_Limit   5

# Keep a local copy for buffering if desktop is unreachable
[OUTPUT]
    Name          file
    Match         cpe.*
    Path          /var/log/fluent-bit
    File          buffer.log
